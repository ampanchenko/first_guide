<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Винные рейтинги · Первый Гид</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">

<!--
========================================================================
  ВИННЫЕ РЕЙТИНГИ · ПЕРВЫЙ ГИД
  Self-contained HTML block. Paste into Tilda T123 (HTML) container.

  Чтобы обновить данные:
    1) Замените содержимое <script id="fg-wines-data"> на свежий JSON
       (формат: {"ratings": [...названия...], "wines": [...]} )
    2) Либо поменяйте загрузку на fetch:
         fetch("/path/to/wines.json").then(r => r.json()).then(init)
========================================================================
-->

<style>
  /* ============ NAMESPACED RESET ============ */
  .fg-ratings *,
  .fg-ratings *::before,
  .fg-ratings *::after {
    box-sizing: border-box;
  }
  .fg-ratings {
    --ink: #1a1614;
    --ink-soft: #4a4035;
    --ink-faint: #7a6f60;
    --paper: #cac4b0;
    --paper-warm: #ede7d3;
    --paper-deep: #ffffff;
    --rule: #a8a08a;
    --wine: #b72424;
    --wine-soft: #cf3a3a;
    --brand-red: #b72424;
    --gold: #a57430;
    --shadow: 0 1px 2px rgba(0, 0, 0, .06), 0 8px 24px rgba(0, 0, 0, .10);

    font-family: "Montserrat", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--ink);
    background: var(--paper);
    line-height: 1.55;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "kern", "liga", "calt";
  }
  .fg-ratings a { color: inherit; text-decoration: none; }
  .fg-ratings button {
    font-family: inherit; font-size: inherit; color: inherit;
    background: none; border: none; cursor: pointer; padding: 0;
  }

  /* ============ LAYOUT ============ */
  .fg-ratings .fg-wrap {
    max-width: 1180px;
    margin: 0 auto;
    padding: clamp(32px, 5vw, 72px) clamp(28px, 5vw, 48px) 0;
  }

  /* ============ FILTER BAR ============ */
  /* ============ RATING HEADING ============ */
  .fg-ratings .fg-rating-heading {
    margin: 0 0 36px 0;
    position: relative;
  }
  .fg-ratings .fg-rating-heading__btn {
    background: transparent;
    border: none;
    padding: 0;
    margin: 0;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    color: var(--ink);
    font-family: "Montserrat", sans-serif;
    text-align: left;
    width: auto;
    max-width: 100%;
    transition: color 0.15s ease;
  }
  .fg-ratings .fg-rating-heading__btn:hover { color: var(--brand-red); }
  .fg-ratings .fg-rating-heading__btn:hover .fg-rating-heading__title {
    text-decoration: underline;
    text-decoration-color: currentColor;
    text-decoration-thickness: 2px;
    text-underline-offset: 8px;
  }
  .fg-ratings .fg-rating-heading__label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--brand-red);
    font-weight: 600;
  }
  .fg-ratings .fg-rating-heading__row {
    display: inline-flex;
    align-items: baseline;
    gap: 18px;
    max-width: 100%;
    font-size: 48px;
    line-height: 1.05;
  }
  .fg-ratings .fg-rating-heading__title {
    font-weight: 600;
    font-size: inherit;
    letter-spacing: -0.025em;
    line-height: inherit;
    flex: 0 1 auto;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  /* The heading uses .fg-filter__btn for behavior, but it must NOT show
     the small generic chevron from .fg-filter__btn::after — it has its own
     larger one (.fg-rating-heading__chevron) sitting next to the title. */
  .fg-ratings .fg-rating-heading__btn::after {
    display: none;
  }
  .fg-ratings .fg-rating-heading__chevron {
    font-size: 0.45em;
    font-weight: 300;
    color: var(--ink-faint);
    line-height: 1;
    transition: transform 0.2s ease;
    flex: 0 0 auto;
  }
  .fg-ratings .fg-rating-heading__btn[aria-expanded="true"] .fg-rating-heading__chevron {
    transform: rotate(180deg);
  }
  @media (max-width: 1100px) {
    .fg-ratings .fg-rating-heading__row { font-size: 42px; }
  }
  @media (max-width: 880px) {
    .fg-ratings .fg-rating-heading__row { font-size: 40px; }
    .fg-ratings .fg-rating-heading { margin-bottom: 24px; }
  }
  @media (max-width: 480px) {
    .fg-ratings .fg-rating-heading__row { font-size: 30px; gap: 20px; }
  }

  /* ============ FILTER BAR ============ */
  .fg-ratings .fg-filters-toggle {
    display: none; /* hidden on desktop, shown on mobile */
  }
  .fg-filters {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    padding: 14px;
    background: var(--paper-warm);
    border: 1px solid var(--rule);
    border-radius: 4px;
    position: relative;
  }
  @media (max-width: 1100px) {
    .fg-filters {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
  }
  @media (max-width: 880px) {
    /* show toggle button */
    .fg-ratings .fg-filters-toggle {
      display: block;
      width: 100%;
      background: var(--paper-warm);
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 14px 16px;
      text-align: left;
      cursor: pointer;
      font-family: "Montserrat", sans-serif;
      color: var(--ink);
      transition: border-color 0.15s ease, background-color 0.15s ease;
    }
    .fg-ratings .fg-filters-toggle:hover {
      border-color: var(--ink-faint);
    }
    .fg-ratings .fg-filters-toggle__row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }
    .fg-ratings .fg-filters-toggle__text {
      flex: 0 0 auto;
    }
    .fg-ratings .fg-filters-toggle__count {
      flex: 0 0 auto;
      color: var(--brand-red);
      font-weight: 600;
      font-size: 13px;
    }
    .fg-ratings .fg-filters-toggle__chevron {
      margin-left: auto;
      font-size: 18px;
      color: var(--ink-faint);
      line-height: 1;
      transition: transform 0.2s ease;
    }
    .fg-ratings .fg-filters-toggle[aria-expanded="true"] .fg-filters-toggle__chevron {
      transform: rotate(180deg);
    }
    /* collapse filters when section is closed */
    .fg-ratings .fg-filters-section[data-expanded="false"] .fg-filters {
      display: none;
    }
    .fg-ratings .fg-filters-section[data-expanded="true"] .fg-filters {
      margin-top: 8px;
    }
    .fg-filters {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }
  @media (max-width: 480px) {
    .fg-filters {
      grid-template-columns: 1fr;
    }
  }

  .fg-filter {
    position: relative;
  }
  .fg-filter__btn {
    width: 100%;
    background: var(--paper-deep);
    border: 1px solid var(--rule);
    padding: 12px 36px 12px 14px;
    text-align: left;
    border-radius: 3px;
    transition: border-color 0.18s ease, box-shadow 0.18s ease;
    position: relative;
    display: block;
    font-size: 14px;
    line-height: 1.3;
    color: var(--ink);
  }
  .fg-filter__btn:hover {
    border-color: var(--ink-soft);
  }
  .fg-filter__btn[aria-expanded="true"] {
    border-color: var(--ink-soft);
    background: var(--paper-warm);
  }
  .fg-filter__btn::after {
    content: "";
    position: absolute;
    right: 14px;
    top: 50%;
    width: 8px;
    height: 8px;
    border-right: 1.5px solid var(--ink-soft);
    border-bottom: 1.5px solid var(--ink-soft);
    transform: translateY(-70%) rotate(45deg);
    transition: transform 0.18s ease;
  }
  .fg-filter__btn[aria-expanded="true"]::after {
    transform: translateY(-30%) rotate(-135deg);
  }
  .fg-filter__label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    font-weight: 500;
    margin-bottom: 3px;
  }
  .fg-filter__value {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .fg-filter__value--placeholder {
    color: var(--ink-faint);
    font-weight: 400;
    font-style: italic;
  }

  /* Dropdown panel */
  .fg-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    background: var(--paper-deep);
    border: 1px solid var(--rule);
    border-radius: 4px;
    box-shadow: var(--shadow);
    z-index: 30;
    display: none;
    overflow: hidden;
  }
  .fg-dropdown.is-open { display: block; }
  .fg-dropdown__search {
    padding: 12px 14px;
    border-bottom: 1px solid var(--rule);
    background: var(--paper-warm);
    position: relative;
    z-index: 2;
  }
  .fg-dropdown__search input {
    width: 100%;
    border: 1px solid var(--rule);
    background: var(--paper);
    padding: 8px 10px;
    font-family: inherit;
    font-size: 16px; /* >=16px prevents iOS Safari auto-zoom on focus */
    color: var(--ink);
    border-radius: 3px;
    outline: none;
  }
  .fg-dropdown__search input:focus {
    border-color: var(--brand-red);
  }
  .fg-dropdown__list {
    max-height: min(60vh, 460px);
    overflow-y: auto;
    padding: 4px 0;
    -webkit-overflow-scrolling: touch;
  }
  .fg-dropdown__item {
    width: 100%;
    text-align: left;
    padding: 14px 36px;
    font-size: 15px;
    line-height: 1.4;
    cursor: pointer;
    transition: background 0.12s ease;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    color: var(--ink);
    border-bottom: 1px solid rgba(0,0,0,0.12);
  }
  .fg-dropdown__item:last-child { border-bottom: none; }
  .fg-dropdown__item:hover { background: var(--paper-warm); }
  .fg-dropdown__item.is-active {
    background: var(--paper);
    color: var(--brand-red);
    font-weight: 600;
  }
  .fg-dropdown__item-count {
    font-size: 11px;
    color: var(--ink-faint);
    font-variant-numeric: tabular-nums;
  }
  .fg-dropdown__empty {
    padding: 20px 14px;
    color: var(--ink-faint);
    font-style: italic;
    text-align: center;
    font-size: 13px;
  }

  /* ============ RESULT META ============ */
  .fg-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin: 14px 0 12px;
  }
  .fg-chips:not(:empty) + .fg-meta {
    margin-top: 6px;
  }
  .fg-meta__count {
    font-family: "Montserrat", sans-serif;
    font-size: 14px;
    color: var(--ink-soft);
    font-style: italic;
    font-weight: 300;
    line-height: 1.3;
    letter-spacing: 0.02em;
  }
  .fg-meta__count strong {
    font-weight: 500;
    font-style: normal;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    font-size: 16px;
    margin-right: 4px;
  }
  .fg-meta__actions {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-left: auto;
    flex-wrap: wrap;
  }
  .fg-meta__reset {
    font-family: "Montserrat", sans-serif;
    font-size: 13px;
    letter-spacing: 0.06em;
    color: var(--brand-red);
    border-bottom: 1px solid currentColor;
    padding-bottom: 1px;
    transition: opacity 0.18s ease;
  }
  .fg-meta__reset:hover { opacity: 0.7; }
  .fg-meta__reset[hidden] { display: none; }

  /* Sort dropdown */
  .fg-sort { position: relative; }
  .fg-sort[hidden] { display: none; }
  .fg-sort__btn {
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 8px 12px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: "Montserrat", sans-serif;
    font-size: 13px;
    color: var(--ink);
    transition: border-color 0.15s ease, background-color 0.15s ease;
  }
  .fg-sort__btn:hover {
    border-color: var(--ink-faint);
    background: var(--paper-warm);
  }
  .fg-sort__label {
    color: var(--ink-faint);
    font-weight: 400;
  }
  .fg-sort__value {
    font-weight: 500;
  }
  .fg-sort__chevron {
    font-size: 14px;
    color: var(--ink-faint);
    line-height: 1;
    transition: transform 0.2s ease;
  }
  .fg-sort__btn[aria-expanded="true"] .fg-sort__chevron {
    transform: rotate(180deg);
  }
  .fg-sort__dropdown {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    min-width: 220px;
    background: var(--paper-deep);
    border: 1px solid var(--rule);
    border-radius: 3px;
    box-shadow: 0 6px 24px rgba(20, 18, 14, 0.12);
    z-index: 50;
    overflow: hidden;
  }
  .fg-sort__dropdown[hidden] { display: none; }
  .fg-sort__opt {
    display: block;
    width: 100%;
    text-align: left;
    padding: 10px 16px;
    background: transparent;
    border: none;
    font-family: "Montserrat", sans-serif;
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    transition: background-color 0.12s ease;
  }
  .fg-sort__opt:last-child { border-bottom: none; }
  .fg-sort__opt:hover { background: var(--paper-warm); }
  .fg-sort__opt[aria-selected="true"] {
    background: var(--paper-warm);
    color: var(--brand-red);
    font-weight: 600;
  }

  /* Active filter chips */
  .fg-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 14px 0 0;
  }
  .fg-chips:empty {
    display: none;
  }
  .fg-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--ink);
    color: var(--paper);
    padding: 5px 8px 5px 12px;
    border-radius: 100px;
    font-size: 12px;
    line-height: 1.2;
    font-weight: 400;
  }
  .fg-chip__close {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    color: var(--paper);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
    font-size: 14px;
    line-height: 1;
  }
  .fg-chip__close:hover { background: rgba(255,255,255,0.3); }

  /* ============ ENTRIES ============ */
  .fg-entries {
    margin-top: 0;
  }
  .fg-entry {
    display: grid;
    grid-template-columns: 80px 220px 1fr auto;
    grid-template-areas:
      "rank photo title aside"
      "rank photo body  aside";
    grid-template-rows: auto auto;
    column-gap: 28px;
    row-gap: 14px;
    align-content: end;
    padding: 32px 0;
    min-height: 300px;
    border-top: 1px solid var(--rule);
    transition: opacity 0.2s ease;
  }
  .fg-entry:last-child { border-bottom: 1px solid var(--rule); }

  /* <header> is a transparent wrapper — children become direct grid items */
  .fg-entry__header { display: contents; }
  /* Rank stays at the top of its multi-row span */
  .fg-entry__rank {
    grid-area: rank;
    align-self: start;
  }
  /* Photo stays at the top too — keeps all rank-1 wines in a clean top line */
  .fg-entry__photo {
    grid-area: photo;
    align-self: start;
  }
  .fg-entry__title { grid-area: title; }
  .fg-entry__body { grid-area: body; }
  .fg-entry__aside { grid-area: aside; }

  /* ranking number — back to its own column, centered, with horizontal rule */
  .fg-entry__rank {
    font-family: "Montserrat", sans-serif;
    font-weight: 300;
    font-size: 64px;
    line-height: 0.9;
    color: var(--wine);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.04em;
    text-align: center;
    padding-top: 4px;
    position: relative;
    align-self: start;
  }
  .fg-entry__rank::after {
    content: "";
    display: block;
    width: 24px;
    height: 1px;
    background: var(--rule);
    margin: 8px auto 0;
  }
  .fg-entry__rank-context {
    font-family: "Montserrat", sans-serif;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-weight: 500;
    margin-top: 6px;
    line-height: 1.3;
    display: block;
  }
  /* In mixed mode (multiple ratings), render compact version */
  .fg-entries.is-mixed .fg-entry__rank { font-size: 36px; }
  .fg-entries.is-mixed .fg-entry__rank::after { width: 18px; margin-top: 4px; }

  /* photo */
  .fg-entry__photo {
    background: #ffffff;
    border: 1px solid var(--rule);
    width: 100%;
    aspect-ratio: 1;
    align-self: start;
    overflow: hidden;
    border-radius: 2px;
    position: relative;
    cursor: zoom-in;
  }
  .fg-entry__photo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 14px;
    transition: transform 0.4s ease;
  }
  .fg-entry:hover .fg-entry__photo img { transform: scale(1.04); }

  /* lightbox */
  .fg-lightbox {
    position: fixed;
    inset: 0;
    background: rgba(20, 18, 14, 0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99999;
    padding: clamp(20px, 4vw, 48px);
    cursor: zoom-out;
    animation: fg-lightbox-fade 0.18s ease;
  }
  @keyframes fg-lightbox-fade { from { opacity: 0; } to { opacity: 1; } }
  .fg-lightbox__img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    background: #ffffff;
    border-radius: 2px;
    padding: 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    cursor: default;
  }
  .fg-lightbox__close {
    position: absolute;
    top: clamp(16px, 3vw, 32px);
    right: clamp(16px, 3vw, 32px);
    width: 44px;
    height: 44px;
    border: none;
    background: rgba(255,255,255,0.12);
    color: #ffffff;
    border-radius: 50%;
    font-size: 24px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Montserrat", sans-serif;
    font-weight: 300;
    transition: background 0.15s ease;
  }
  .fg-lightbox__close:hover { background: rgba(255,255,255,0.22); }
  .fg-lightbox__caption {
    position: absolute;
    bottom: clamp(20px, 3vw, 32px);
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.75);
    font-family: "Montserrat", sans-serif;
    font-size: 13px;
    text-align: center;
    max-width: 80vw;
    pointer-events: none;
  }

  /* main info */
  .fg-entry__body {
    min-width: 0;
  }
  .fg-entry__title {
    font-family: "Montserrat", sans-serif;
    font-weight: 600;
    font-size: 22px;
    line-height: 1.25;
    margin: 0;
    color: var(--ink);
    letter-spacing: -0.01em;
    min-width: 0;
  }
  .fg-entry__tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }
  .fg-entry__tag {
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--ink-soft);
    background: var(--paper-warm);
    border: 1px solid var(--rule);
    padding: 3px 8px;
    border-radius: 2px;
    font-weight: 400;
    line-height: 1.4;
  }
  .fg-entry__meta {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.6;
    margin: 0;
  }
  .fg-entry__meta-row {
    display: flex;
    gap: 8px;
    align-items: baseline;
  }
  .fg-entry__meta-key {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-weight: 500;
    min-width: 92px;
    flex-shrink: 0;
    padding-top: 2px;
  }
  .fg-entry__meta-val {
    font-size: 13.5px;
    color: var(--ink);
    flex: 1;
  }
  .fg-entry__grape-link {
    cursor: pointer;
    transition: color 0.15s ease;
    border-bottom: 1px dotted transparent;
  }
  .fg-entry__grape-link:hover {
    color: var(--wine);
    border-bottom-color: var(--wine);
  }

  /* right column: price-note + buy */
  .fg-entry__aside {
    text-align: right;
    min-width: 180px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  .fg-entry__price {
    font-family: "Montserrat", sans-serif;
    font-size: 28px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 4px;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .fg-entry__price-note {
    font-family: "Montserrat", sans-serif;
    font-style: italic;
    font-size: 12px;
    color: var(--ink-faint);
    margin-bottom: 16px;
    font-weight: 300;
  }
  .fg-entry__shops {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: stretch;
    max-width: 220px;
    margin-left: auto;
  }
  .fg-entry__shops-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--brand-red);
    font-weight: 600;
    text-align: right;
    margin-bottom: 2px;
  }
  .fg-shop {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding: 8px 13px;
    border: 1px solid var(--rule);
    background: var(--paper-deep);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    border-radius: 2px;
    transition: all 0.18s ease;
    text-align: left;
  }
  .fg-shop:hover {
    border-color: var(--brand-red);
    color: var(--brand-red);
    background: var(--paper-warm);
  }
  .fg-shop::after {
    content: "→";
    font-size: 14px;
    color: var(--brand-red);
    transition: transform 0.18s ease;
  }
  .fg-shop:hover::after {
    transform: translateX(3px);
  }
  .fg-entry__no-shops {
    font-size: 12px;
    color: var(--ink-faint);
    font-style: italic;
    text-align: right;
  }

  /* Mobile: stack the entry vertically. Use a 2-column grid so that the
     rank can sit on the same line as the title, while everything else
     (photo, tags, meta, aside) spans both columns below. */
  @media (max-width: 880px) {
    .fg-entry {
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-areas: none;
      grid-template-rows: none;
      align-content: start;
      gap: 0;
      column-gap: 12px;
      padding: 28px 0;
      min-height: 0;
      border-top: none;
    }
    .fg-entries .fg-entry:first-child { padding-top: 8px; }

    /* Header is a transparent wrapper — rank and title become direct grid items
       so they sit on the same row. */
    .fg-entry__header { display: contents; }

    .fg-entry__rank {
      grid-area: auto;
      grid-column: 1;
      font-size: 32px;
      text-align: left;
      padding-top: 0;
      align-self: start;
      display: flex;
      flex-direction: row;
      gap: 8px;
      align-items: baseline;
      line-height: 1.25;
    }
    .fg-entry__rank::after {
      display: none;
    }
    .fg-entry__rank-context {
      margin-top: 0;
      font-size: 8px;
    }
    .fg-entries.is-mixed .fg-entry__rank { font-size: 26px; }

    .fg-entry__title {
      grid-area: auto;
      grid-column: 2;
      font-size: 18px;
      line-height: 1.3;
      margin: 0;
      padding-top: 4px;
      align-self: start;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    /* Everything below the header row spans full width with a top gap */
    .fg-entry__photo {
      grid-area: auto;
      grid-column: 1 / -1;
      width: 100%;
      max-width: none;
      height: 360px;
      min-height: 0;
      aspect-ratio: auto;
      align-self: stretch;
      margin-top: 18px;
      cursor: default;
    }
    .fg-entry__photo img { padding: 18px; }
    .fg-entry:hover .fg-entry__photo img { transform: none; }

    .fg-entry__body {
      grid-area: auto;
      grid-column: 1 / -1;
      display: block;
      margin-top: 14px;
    }
    .fg-entry__tags { margin-bottom: 12px; }
    .fg-entry__meta { margin-top: 0; }

    .fg-entry__aside {
      grid-area: auto;
      grid-column: 1 / -1;
      text-align: left;
      display: block;
      border-top: 1px solid var(--rule);
      padding-top: 16px;
      margin-top: 18px;
    }
    .fg-entry__shops { max-width: none; margin-left: 0; }
    .fg-entry__shops-label { text-align: left; }
    .fg-entry__no-shops { text-align: left; }
    .fg-entry__price { font-size: 24px; }
    .fg-entry__meta-key { min-width: 80px; }
  }

  /* ============ LOAD MORE ============ */
  .fg-load-more {
    display: block;
    margin: 32px auto;
    padding: 14px 32px;
    background: transparent;
    border: 1px solid var(--ink-soft);
    border-radius: 3px;
    font-family: "Montserrat", sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .fg-load-more:hover {
    border-color: var(--brand-red);
    color: var(--brand-red);
    background: var(--paper-warm);
  }
  .fg-load-more__count {
    font-variant-numeric: tabular-nums;
    margin: 0 4px;
  }
  .fg-load-more[hidden] { display: none; }

  /* ============ EMPTY STATE ============ */
  .fg-empty {
    text-align: center;
    padding: 80px 20px;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    margin-top: 12px;
  }
  .fg-empty__title {
    font-family: "Montserrat", sans-serif;
    font-style: italic;
    font-size: 22px;
    font-weight: 400;
    color: var(--ink-soft);
    margin: 0 0 8px;
  }
  .fg-empty__sub {
    font-size: 14px;
    color: var(--ink-faint);
    margin: 0 0 20px;
  }

  /* ============ FOCUS / A11Y ============ */
  .fg-ratings :focus-visible {
    outline: 2px solid var(--wine);
    outline-offset: 2px;
  }

  /* prevent body scroll-lock from interfering */
  .fg-ratings {
    isolation: isolate;
  }

  /* Disable iOS Safari double-tap zoom on all interactive elements.
     'manipulation' allows pan + pinch-zoom but blocks the double-tap-to-zoom
     gesture, which was triggering accidental zoom-in on filter buttons,
     dropdown options, sort, and shop cards. */
  .fg-ratings button,
  .fg-ratings a,
  .fg-ratings [role="option"],
  .fg-ratings [role="listbox"],
  .fg-ratings .fg-filter,
  .fg-ratings .fg-chip,
  .fg-ratings .fg-shop,
  .fg-ratings .fg-entry__photo,
  .fg-ratings .fg-entry__grape-link,
  .fg-ratings input,
  .fg-ratings select,
  .fg-ratings label {
    touch-action: manipulation;
  }
</style>
</head>

    // Если в YML название рейтинга лежит не в <description>, укажите тут param-имя
    // (например, "Рейтинг" или "Категория"). null = пробовать стандартные эвристики.
    ratingFieldOverride: "Рейтинг",

    // Если порядок мест 1–10 в YML лежит в каком-то <param>, укажите его имя
    // (например, "Место" или "Оценка"). null = пробовать стандартные эвристики.
    rankFieldOverride: "Место",
  };

  // -------- LOAD DATA (JSON URL → YML URL → embedded fallback) --------
  const root = document.querySelector(".fg-ratings");
  const $ = sel => root.querySelector(sel);
  const $$ = sel => Array.from(root.querySelectorAll(sel));

  // Show loading hint until data arrives
  const entriesEl = $("#fg-entries");
  entriesEl.innerHTML =
    '<div style="text-align:center;padding:80px 20px;color:var(--ink-faint);' +
    'font-family:Montserrat,sans-serif;font-style:italic;font-size:18px;">' +
    'Загружаем рейтинги…</div>';

  loadData().then(data => {
    DATA = data;
    ALL_WINES = DATA.wines;
    RATINGS = DATA.ratings;
    state.rating = RATINGS[0] || null;
    DEFAULT_RATING = state.rating;
    buildSlugMap();
    applyHashState();
    render();
  }).catch(err => {
    console.error("[fg-ratings] Не удалось загрузить данные:", err);
    entriesEl.innerHTML =
      '<div style="text-align:center;padding:80px 20px;color:var(--ink-faint);">' +
      'Не удалось загрузить винные рейтинги. Попробуйте перезагрузить страницу.</div>';
  });

  async function loadData() {
    // 1. JSON URL — preferred path, full data fidelity
    if (CONFIG.jsonUrl) {
      try {
        const cached = readCache(CONFIG.jsonUrl);
        if (cached) return cached;
        const text = await fetchText(CONFIG.jsonUrl);
        const parsed = JSON.parse(text);
        if (!parsed.wines || parsed.wines.length === 0) {
          throw new Error("JSON загружен, но в нём нет вин");
        }
        // If ratings list missing, derive from wines
        if (!parsed.ratings || !parsed.ratings.length) {
          parsed.ratings = sortRatings(Array.from(new Set(parsed.wines.map(w => w.rating).filter(Boolean))));
        }
        writeCache(CONFIG.jsonUrl, parsed);
        return parsed;
      } catch (e) {
        console.warn("[fg-ratings] JSON не загрузился, пробую YML:", e);
      }
    }

    // 2. YML feed — fallback with known limitations
    if (CONFIG.ymlFeedUrl) {
      try {
        const cached = readCache(CONFIG.ymlFeedUrl);
        if (cached) return cached;
        const text = await fetchText(CONFIG.ymlFeedUrl);
        const parsed = parseYml(text);
        if (parsed.wines.length === 0) {
          throw new Error("YML распарсен, но не нашлось вин с проставленным рейтингом");
        }
        writeCache(CONFIG.ymlFeedUrl, parsed);
        return parsed;
      } catch (e) {
        console.warn("[fg-ratings] YML не сработал, использую вшитые данные:", e);
      }
    }

    // 3. Embedded data — always works
    return JSON.parse(document.getElementById("fg-wines-data").textContent);
  }

  async function fetchText(url) {
    const res = await fetch(url, { cache: "default" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.text();
  }

  function readCache(url) {
    if (!CONFIG.cacheTtlMinutes) return null;
    try {
      const raw = sessionStorage.getItem("fg-ratings-cache::" + url);
      if (!raw) return null;
      const obj = JSON.parse(raw);
      if (Date.now() - obj.t > CONFIG.cacheTtlMinutes * 60 * 1000) return null;
      return obj.d;
    } catch (e) { return null; }
  }
  function writeCache(url, data) {
    if (!CONFIG.cacheTtlMinutes) return;
    try {
      sessionStorage.setItem("fg-ratings-cache::" + url,
        JSON.stringify({ t: Date.now(), d: data }));
    } catch (e) { /* quota exceeded — fine, just skip */ }
  }

  // -------- YML PARSER (Tilda Store format) --------
  function parseYml(text) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(text, "text/xml");
    const parseError = doc.querySelector("parsererror");
    if (parseError) throw new Error("XML parse error: " + parseError.textContent);

    const offers = Array.from(doc.querySelectorAll("offer"));
    const wines = [];

    offers.forEach((offer, idx) => {
      // Collect all <param name="...">value</param>
      const params = {};
      offer.querySelectorAll("param").forEach(p => {
        const name = p.getAttribute("name");
        if (name) params[name] = p.textContent.trim();
      });

      const getText = tag => {
        const el = offer.querySelector(tag);
        return el ? el.textContent.trim() : "";
      };

      // Wine title: Tilda emits <n>, other YML producers use <name>
      const title = getText("n") || getText("name");

      // Rating name (param[Рейтинг] in Tilda's case)
      const rating = CONFIG.ratingFieldOverride
        ? (params[CONFIG.ratingFieldOverride] || "")
        : getText("description") || params["Рейтинг"] || params["Категория"] || "";

      // Rank — try multiple strategies
      const rank = extractRank(offer, params, idx);

      // Grapes — split by , or ;
      const grapeStr = params["Виноград"] || "";
      const grapes = grapeStr.split(/[,;]/)
        .map(g => g.trim())
        .filter(Boolean)
        .map(g => g[0].toUpperCase() + g.slice(1));

      // Shop links: try to extract <a href> from <description>, then from <text> if exists.
      // Tilda's YML strips <a> tags down to plain text — in that case shop_links will be empty.
      const descHtml = getText("description");
      const textEl = offer.querySelector("text");
      const textHtml = textEl ? textEl.textContent : "";
      const shopLinks = parseShopLinks(descHtml + " " + textHtml);

      wines.push({
        id: offer.getAttribute("id") || String(idx),
        title: title,
        brand: getText("vendor") || params["Бренд"] || "",
        producer: params["Производитель"] || "",
        vintage: params["Винтаж"] || "",
        color: params["Цвет"] || "",
        sugar: params["Сахар"] || "",
        type: params["Тип"] || "",
        method: params["Способ производства"] || params["Метод"] || "",
        region: params["Регион"] || "",
        grapes: grapes,
        rating: rating,
        rank: rank,
        photo: getText("picture"),
        price: parseInt(getText("price")) || 0,
        shop_links: shopLinks,
      });
    });

    // Only keep wines that have a rating tag — without it we can't position them
    const valid = wines.filter(w => w.rating);

    // Build sorted ratings list (newest first)
    const ratings = sortRatings(Array.from(new Set(valid.map(w => w.rating))));

    return { ratings, wines: valid };
  }

  function extractRank(offer, params, fallbackIdx) {
    // Custom override first
    if (CONFIG.rankFieldOverride && params[CONFIG.rankFieldOverride]) {
      const n = parseInt(params[CONFIG.rankFieldOverride]);
      if (!isNaN(n) && n > 0) return n;
    }
    // Common Tilda places to look
    const candidates = [
      params["Место"], params["Mark"], params["Оценка"], params["Rank"],
      offer.getAttribute("mark"),
    ];
    for (const c of candidates) {
      if (c == null) continue;
      const n = parseInt(c);
      if (!isNaN(n) && n > 0 && n <= 100) return n;
    }
    // Last resort: use 1-based index (assumes Tilda preserves Store order)
    return fallbackIdx + 1;
  }

  function parseShopLinks(html) {
    if (!html) return [];
    const links = [];
    const re = /<a[^>]+href=["']([^"']+)["'][^>]*>([\s\S]*?)<\/a>/gi;
    let m;
    while ((m = re.exec(html)) !== null) {
      const url = cleanTrackingParams(m[1]);
      const inner = m[2];
      const name = inner.replace(/<[^>]+>/g, "")
        .replace(/&nbsp;/g, " ").replace(/&amp;/g, "&")
        .trim();
      if (url && name) links.push({ name, url });
    }
    return links;
  }

  // Strip tracking query parameters (ysclid, utm_*, gclid, etc.)
  const TRACKING_PARAMS = new Set([
    "ysclid", "yclid", "gclid", "gclsrc", "dclid",
    "fbclid", "_openstat", "mc_eid", "mc_cid",
    "utm_source", "utm_medium", "utm_campaign",
    "utm_term", "utm_content", "utm_id", "utm_name",
    "igshid", "twclid", "mkt_tok",
  ]);
  function cleanTrackingParams(url) {
    if (!url || url.indexOf("?") === -1) return url;
    try {
      const u = new URL(url);
      const keep = [];
      u.searchParams.forEach((v, k) => {
        if (!TRACKING_PARAMS.has(k.toLowerCase())) keep.push([k, v]);
      });
      // Rebuild
      u.search = "";
      keep.forEach(([k, v]) => u.searchParams.append(k, v));
      return u.toString();
    } catch (e) {
      return url;
    }
  }

  function sortRatings(arr) {
    // Parse "Topic MM'YY" or "Topic 'YY" — newest first
    function key(name) {
      const m = name.match(/(?:(\d{2}))?'(\d{2})\s*$/);
      if (!m) return [0, 0];
      const month = m[1] ? parseInt(m[1]) : 6;
      const year = 2000 + parseInt(m[2]);
      return [year, month];
    }
    return arr.slice().sort((a, b) => {
      const [yA, mA] = key(a);
      const [yB, mB] = key(b);
      if (yA !== yB) return yB - yA;
      return mB - mA;
    });
  }

  // -------- STATE & RENDER (same logic as before) --------
  let DATA, ALL_WINES, RATINGS, DEFAULT_RATING;
  const state = {
    rating: null, grape: null, brand: null, vintage: null, price: null,
    color: null, sugar: null, type: null, region: null,
    sort: "default"
  };

  // Sort options — only used when no specific rating is selected
  const SORT_OPTIONS = [
    { id: "default",    label: "по умолчанию" },
    { id: "title-asc",  label: "по названию (А → Я)" },
    { id: "rank-asc",   label: "по месту в рейтинге" },
    { id: "price-asc",  label: "по цене (дешевле сначала)" },
    { id: "price-desc", label: "по цене (дороже сначала)" }
  ];

  function sortWines(wines, sortId) {
    if (sortId === "default" || !sortId) return wines;
    const arr = wines.slice();
    if (sortId === "title-asc") {
      arr.sort((a, b) => ruSort(a.title, b.title));
    } else if (sortId === "rank-asc") {
      arr.sort((a, b) => (a.rank || 999) - (b.rank || 999));
    } else if (sortId === "price-asc") {
      arr.sort((a, b) => (a.price || Infinity) - (b.price || Infinity));
    } else if (sortId === "price-desc") {
      arr.sort((a, b) => (b.price || -Infinity) - (a.price || -Infinity));
    }
    return arr;
  }

  // Price buckets — wine list filter pricing tiers
  const PRICE_BUCKETS = [
    { id: "lt1000",     label: "до 1000 \u20BD",     min: 0,    max: 1000     },
    { id: "1000-2500",  label: "1000\u20132500 \u20BD",  min: 1000, max: 2500     },
    { id: "2500-5000",  label: "2500\u20135000 \u20BD",  min: 2500, max: 5000     },
    { id: "5000plus",   label: "5000+ \u20BD",       min: 5000, max: Infinity }
  ];
  function priceLabel(id) {
    const b = PRICE_BUCKETS.find(b => b.id === id);
    return b ? b.label : "";
  }
  function inPriceBucket(price, bucket) {
    const p = price || 0;
    return p >= bucket.min && p < bucket.max;
  }

  function escapeHtml(s) {
    if (s == null) return "";
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
  }

  function safeHttpUrl(url) {
    if (!url) return "";
    try {
      const parsed = new URL(String(url), window.location.href);
      if (parsed.protocol !== "http:" && parsed.protocol !== "https:") return "";
      return parsed.href;
    } catch (e) {
      return "";
    }
  }

  function fmtRank(rank) {
    const n = parseInt(rank, 10);
    return Number.isFinite(n) && n > 0 ? String(n) : "";
  }

  function fmtPrice(p) {
    if (!p || p < 1) return "";
    return p.toLocaleString("ru-RU") + " \u20BD";
  }

  function ruSort(a, b) { return a.localeCompare(b, "ru", { sensitivity: "base" }); }

  // ===== URL hash routing for sharing direct rating links =====
  const TRANSLIT_MAP = {
    'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh',
    'з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p',
    'р':'r','с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh',
    'щ':'sch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'
  };
  // Russian topic → English slug. Add new entries here when adding new rating themes.
  // If a topic isn't in this map, slugify falls back to transliteration.
  const SLUG_TOPICS = {
    // Cорта (могут быть в ед. и мн. числе)
    "Шардоне": "chardonnay",
    "Рислинг": "riesling",
    "Рислинги": "riesling",
    "Пино Нуар": "pinot-noir",
    "Пино Нуары": "pinot-noir",
    "Петнат": "pet-nat",
    "Петнаты": "pet-nat",
    "Совиньон Блан": "sauvignon-blanc",
    "Совиньон Бланы": "sauvignon-blanc",
    "Красностоп": "krasnostop",
    "Красностопы": "krasnostop",
    // Категории
    "Игристые": "sparkling",
    "Игристые вина": "sparkling-wines",
    "Игристые розовые": "sparkling-rose",
    "Игристые розовые вина": "sparkling-rose",
    "Тихие розовые": "still-rose",
    "Тихие розовые вина": "still-rose",
    "Оранжевые": "orange-wines",
    "Оранжевые вина": "orange-wines",
    "Красные вина": "red-wines",
    "Дачные красные": "country-reds",
    // Тематические
    "Вина для лета": "summer-wines",
    "Недорогие романтические": "affordable-romantic"
  };
  function transliterate(s) {
    return s.toLowerCase()
      .split('').map(c => TRANSLIT_MAP[c] !== undefined ? TRANSLIT_MAP[c] : c).join('')
      .replace(/[^a-z0-9\s-]+/g, '')
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '');
  }
  function slugify(s) {
    if (!s) return '';
    // Parse "Topic MM'YY" or "Topic 'YY" at end of string
    const m = s.match(/^(.+?)\s+(?:(\d{2}))?'(\d{2})\s*$/);
    if (m) {
      const topic = m[1].trim();
      const month = m[2] || null;
      const year = m[3];
      const slugTopic = SLUG_TOPICS[topic] || transliterate(topic);
      const datePart = month ? `${month}-20${year}` : `20${year}`;
      return slugTopic ? `${slugTopic}-${datePart}` : datePart;
    }
    // Fallback: no recognizable date suffix — full transliteration
    return transliterate(s);
  }
  let RATING_SLUGS = {}; // { slug: ratingName }
  function buildSlugMap() {
    RATING_SLUGS = {};
    RATINGS.forEach(r => { RATING_SLUGS[slugify(r)] = r; });
  }
  function applyHashState() {
    let hash = (location.hash || '').replace('#', '').trim();
    try {
      hash = decodeURIComponent(hash);
    } catch (e) {
      // Ignore malformed percent-encoding in shared/manual URLs.
    }
    if (!hash) return;
    if (hash === 'all') {
      state.rating = null;
    } else if (RATING_SLUGS[hash]) {
      state.rating = RATING_SLUGS[hash];
    }
  }
  function updateHash() {
    if (!RATINGS) return;
    const slug = state.rating ? slugify(state.rating) : 'all';
    const current = (location.hash || '').replace('#', '');
    if (current !== slug) {
      try { history.replaceState(null, '', '#' + slug); } catch (e) { /* graceful fail */ }
    }
    // When embedded, also notify parent so it can sync its own URL
    if (window.parent !== window) {
      try {
        window.parent.postMessage({ type: "fg-ratings-hash", hash: slug }, "*");
      } catch (e) { /* ignore */ }
    }
  }

  function buildOptions(filterType) {
    const otherFilters = { ...state, [filterType]: null };
    const filteredByOthers = ALL_WINES.filter(w => matchesFilters(w, otherFilters));
    if (filterType === "rating") {
      const counts = {};
      filteredByOthers.forEach(w => { counts[w.rating] = (counts[w.rating] || 0) + 1; });
      return RATINGS.map(r => ({ value: r, label: r, count: counts[r] || 0 }))
        .filter(o => o.count > 0 || state.rating === o.value);
    }
    if (filterType === "price") {
      return PRICE_BUCKETS.map(b => ({
        value: b.id,
        label: b.label,
        count: filteredByOthers.filter(w => inPriceBucket(w.price, b)).length
      })).filter(o => o.count > 0 || state.price === o.value);
    }
    const valueMap = {};
    filteredByOthers.forEach(w => {
      let vals = [];
      if (filterType === "grape") vals = w.grapes || [];
      else if (filterType === "brand") vals = w.brand ? [w.brand] : [];
      else if (filterType === "vintage") vals = w.vintage ? [w.vintage] : [];
      else if (filterType === "color") vals = w.color ? [w.color] : [];
      else if (filterType === "sugar") vals = w.sugar ? [w.sugar] : [];
      else if (filterType === "type") vals = w.type ? [w.type] : [];
      else if (filterType === "region") vals = w.region ? [w.region] : [];
      vals.forEach(v => { if (v) valueMap[v] = (valueMap[v] || 0) + 1; });
    });
    const arr = Object.keys(valueMap).map(v => ({ value: v, label: v, count: valueMap[v] }));
    if (filterType === "vintage") {
      // Newest year first
      arr.sort((a, b) => b.value.localeCompare(a.value));
    } else {
      arr.sort((a, b) => ruSort(a.label, b.label));
    }
    return arr;
  }

  function matchesFilters(wine, filters) {
    if (filters.rating && wine.rating !== filters.rating) return false;
    if (filters.grape && !(wine.grapes || []).includes(filters.grape)) return false;
    if (filters.brand && wine.brand !== filters.brand) return false;
    if (filters.vintage && wine.vintage !== filters.vintage) return false;
    if (filters.color && wine.color !== filters.color) return false;
    if (filters.sugar && wine.sugar !== filters.sugar) return false;
    if (filters.type && wine.type !== filters.type) return false;
    if (filters.region && wine.region !== filters.region) return false;
    if (filters.price) {
      const bucket = PRICE_BUCKETS.find(b => b.id === filters.price);
      if (!bucket || !inPriceBucket(wine.price, bucket)) return false;
    }
    return true;
  }

  let openDropdown = null;
  function closeDropdown() {
    if (openDropdown) {
      openDropdown.classList.remove("is-open");
      const btn = openDropdown.previousElementSibling;
      if (btn) btn.setAttribute("aria-expanded", "false");
      openDropdown.remove();
      openDropdown = null;
    }
  }

  function openDropdownFor(filterType) {
    closeDropdown();
    const filterEl = root.querySelector(`.fg-filter[data-filter="${filterType}"]`);
    const btn = filterEl.querySelector(".fg-filter__btn");
    const opts = buildOptions(filterType);
    const labels = {
      rating: "Все вина из рейтингов", grape: "Все сорта",
      brand: "Все бренды", vintage: "Любой год",
      price: "Любая цена", color: "Любой цвет",
      sugar: "Любой сахар", type: "Любой тип",
      region: "Любой регион"
    };
    const showSearch = opts.length > 8;

    const dropdown = document.createElement("div");
    dropdown.className = "fg-dropdown is-open";
    dropdown.innerHTML = `
      ${showSearch ? `
        <div class="fg-dropdown__search">
          <input type="text" placeholder="Поиск..." autocomplete="off">
        </div>` : ""}
      <div class="fg-dropdown__list" role="listbox"></div>
    `;
    filterEl.appendChild(dropdown);

    const listEl = dropdown.querySelector(".fg-dropdown__list");
    const searchInput = dropdown.querySelector("input");

    function renderList(filterText) {
      const q = (filterText || "").trim().toLowerCase();
      let items = [{ value: null, label: labels[filterType], count: null, isReset: true }];
      const filteredOpts = q ? opts.filter(o => o.label.toLowerCase().includes(q)) : opts;
      items = items.concat(filteredOpts);

      if (filteredOpts.length === 0 && q) {
        listEl.innerHTML = `<div class="fg-dropdown__empty">По запросу «${escapeHtml(filterText)}» ничего не нашлось</div>`;
        return;
      }
      listEl.innerHTML = items.map(item => {
        const isActive = state[filterType] === item.value;
        const cls = `fg-dropdown__item${isActive ? " is-active" : ""}`;
        const countHtml = item.count != null ? `<span class="fg-dropdown__item-count">${item.count}</span>` : "";
        return `<button type="button" class="${cls}" role="option"
          aria-selected="${isActive}" data-value="${escapeHtml(item.value || "")}">
          <span>${escapeHtml(item.label)}</span>${countHtml}
        </button>`;
      }).join("");

      const optionEls = Array.from(listEl.querySelectorAll(".fg-dropdown__item"));
      const focusOption = nextIdx => {
        const next = optionEls[nextIdx];
        if (next) next.focus();
      };
      optionEls.forEach((el, idx) => {
        el.addEventListener("click", () => {
          const item = items[idx];
          state[filterType] = item.isReset ? null : item.value;
          closeDropdown();
          render();
        });
        el.addEventListener("keydown", e => {
          if (e.key === "ArrowDown") {
            e.preventDefault();
            focusOption(Math.min(idx + 1, optionEls.length - 1));
          } else if (e.key === "ArrowUp") {
            e.preventDefault();
            focusOption(Math.max(idx - 1, 0));
          } else if (e.key === "Home") {
            e.preventDefault();
            focusOption(0);
          } else if (e.key === "End") {
            e.preventDefault();
            focusOption(optionEls.length - 1);
          }
        });
      });
    }

    renderList("");
    if (searchInput) {
      searchInput.focus();
      searchInput.addEventListener("input", e => renderList(e.target.value));
      searchInput.addEventListener("keydown", e => {
        if (e.key === "ArrowDown") {
          const first = listEl.querySelector(".fg-dropdown__item");
          if (first) {
            e.preventDefault();
            first.focus();
          }
        }
      });
    } else {
      const active = listEl.querySelector(".fg-dropdown__item.is-active");
      const first = listEl.querySelector(".fg-dropdown__item");
      (active || first)?.focus();
    }

    btn.setAttribute("aria-expanded", "true");
    openDropdown = dropdown;
  }

  document.addEventListener("click", e => {
    if (!openDropdown) return;
    if (!openDropdown.parentElement.contains(e.target)) closeDropdown();
  });
  document.addEventListener("keydown", e => {
    if (e.key === "Escape" && openDropdown) closeDropdown();
  });

  $$(".fg-filter").forEach(filterEl => {
    const filterType = filterEl.dataset.filter;
    const btn = filterEl.querySelector(".fg-filter__btn");
    btn.addEventListener("click", e => {
      e.stopPropagation();
      if (openDropdown && openDropdown.parentElement === filterEl) {
        closeDropdown();
      } else {
        openDropdownFor(filterType);
      }
    });
  });

  function updateFilterButtons() {
    const labels = {
      rating: { name: "Рейтинг", placeholder: "Все вина из рейтингов" },
      grape: { name: "Виноград", placeholder: "все сорта" },
      brand: { name: "Бренд", placeholder: "все бренды" },
      vintage: { name: "Год", placeholder: "любой год" },
      price: { name: "Цена", placeholder: "любая цена" },
      color: { name: "Цвет", placeholder: "любой цвет" },
      sugar: { name: "Сахар", placeholder: "любой сахар" },
      type: { name: "Тип", placeholder: "любой тип" },
      region: { name: "Регион", placeholder: "любой регион" },
    };
    Object.keys(labels).forEach(type => {
      const filterEl = root.querySelector(`.fg-filter[data-filter="${type}"]`);
      const valueEl = filterEl.querySelector(".fg-filter__value");
      const v = state[type];
      if (v) {
        let display = v;
        if (type === "rating") display = v;
        else if (type === "price") display = priceLabel(v);
        valueEl.textContent = display;
        valueEl.classList.remove("fg-filter__value--placeholder");
      } else {
        valueEl.textContent = labels[type].placeholder;
        valueEl.classList.add("fg-filter__value--placeholder");
      }
    });
  }

  function renderChips() {
    const chipsEl = $("#fg-chips");
    const chips = [];
    [{ key: "grape" }, { key: "brand" }, { key: "vintage" }, { key: "price" },
     { key: "color" }, { key: "sugar" }, { key: "type" }, { key: "region" }].forEach(t => {
      if (state[t.key]) {
        const display = t.key === "price" ? priceLabel(state[t.key]) : state[t.key];
        chips.push(`<span class="fg-chip">${escapeHtml(display)}<button class="fg-chip__close" data-clear="${t.key}" aria-label="Снять фильтр">×</button></span>`);
      }
    });
    chipsEl.innerHTML = chips.join("");
    chipsEl.querySelectorAll("[data-clear]").forEach(btn => {
      btn.addEventListener("click", () => {
        state[btn.dataset.clear] = null;
        render();
      });
    });
  }

  function renderMeta(filteredCount) {
    const metaEl = $("#fg-meta");
    const countEl = $("#fg-count");
    const resetEl = $("#fg-reset");
    const noSecondary = !state.grape && !state.brand && !state.vintage && !state.price
      && !state.color && !state.sugar && !state.type && !state.region;

    // Show count text only when secondary filters are applied, or when nothing matched.
    // No filters → no "N вин" line at all (matches the bare initial state).
    let label = "";
    if (filteredCount === 0) {
      label = "Ничего не нашлось";
    } else if (!noSecondary) {
      label = `Найдено <strong>${filteredCount}</strong> ${pluralize(filteredCount, "вино", "вина", "вин")}`;
    }

    countEl.innerHTML = label;
    const hasFilters = state.rating !== DEFAULT_RATING || !noSecondary;
    resetEl.hidden = !hasFilters;

    // Hide the whole meta block when there's neither count text nor reset link
    metaEl.hidden = !label && resetEl.hidden;
  }

  function pluralize(n, one, few, many) {
    const m10 = n % 10, m100 = n % 100;
    if (m10 === 1 && m100 !== 11) return one;
    if (m10 >= 2 && m10 <= 4 && (m100 < 12 || m100 > 14)) return few;
    return many;
  }

  function renderEntries(wines) {
    const listEl = $("#fg-entries");
    const emptyEl = $("#fg-empty");
    if (wines.length === 0) {
      listEl.innerHTML = "";
      emptyEl.hidden = false;
      return;
    }
    emptyEl.hidden = true;

    const allSameRating = wines.every(w => w.rating === wines[0].rating);
    listEl.classList.toggle("is-single-rating", allSameRating);
    listEl.classList.toggle("is-mixed", !allSameRating);

    // Only apply default rating+rank ordering when user sort is "default";
    // otherwise respect the order coming in from the user-chosen sort.
    if (state.sort === "default" || !state.sort) {
      const ratingOrder = {};
      RATINGS.forEach((r, i) => ratingOrder[r] = i);
      wines.sort((a, b) => {
        if (allSameRating) return a.rank - b.rank;
        const da = ratingOrder[a.rating] ?? 999;
        const db = ratingOrder[b.rating] ?? 999;
        if (da !== db) return da - db;
        return a.rank - b.rank;
      });
    }

    listEl.innerHTML = wines.map(w => entryHtml(w, allSameRating)).join("");

    listEl.querySelectorAll("[data-grape]").forEach(el => {
      el.addEventListener("click", () => {
        state.grape = el.dataset.grape;
        render();
        const ft = root.querySelector(".fg-filters");
        if (ft) ft.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    });

    listEl.querySelectorAll(".fg-entry__photo").forEach(el => {
      el.addEventListener("click", () => {
        // On mobile (≤880px) photo is not clickable — skip lightbox
        if (window.matchMedia("(max-width: 880px)").matches) return;
        const img = el.querySelector("img");
        if (!img || !img.src) return;
        const card = el.closest(".fg-entry");
        const titleEl = card ? card.querySelector(".fg-entry__title") : null;
        const caption = titleEl ? titleEl.textContent.trim() : "";
        openLightbox(img.src, img.alt || caption, caption);
      });
    });
  }

  function openLightbox(src, alt, caption) {
    const lb = document.createElement("div");
    lb.className = "fg-lightbox";
    lb.setAttribute("role", "dialog");
    lb.setAttribute("aria-modal", "true");
    lb.setAttribute("aria-label", caption || "Фото вина");
    lb.innerHTML =
      '<button type="button" class="fg-lightbox__close" aria-label="Закрыть">\u00d7</button>' +
      '<img class="fg-lightbox__img" src="' + escapeHtml(src) + '" alt="' + escapeHtml(alt || "") + '" />' +
      (caption ? '<div class="fg-lightbox__caption">' + escapeHtml(caption) + '</div>' : '');

    // When embedded in an iframe, position the lightbox to overlap exactly the
    // visible portion of the iframe. The parent page sends viewport info via
    // postMessage; we use it to position absolutely within document scroll space
    // (position:fixed inside an iframe would be relative to the iframe's own
    // scrollable area, not the user's actual viewport).
    const isEmbedded = window.parent !== window;
    const vp = window.__fgViewport;
    if (isEmbedded && vp && typeof vp.top === "number") {
      lb.style.position = "absolute";
      lb.style.top = vp.top + "px";
      lb.style.left = "0";
      lb.style.right = "auto";
      lb.style.bottom = "auto";
      lb.style.width = "100%";
      lb.style.height = vp.height + "px";
    }

    document.body.appendChild(lb);
    const prevOverflow = document.body.style.overflow;
    document.body.style.overflow = "hidden";

    function close() {
      lb.remove();
      document.body.style.overflow = prevOverflow;
      document.removeEventListener("keydown", onKey);
      window.removeEventListener("message", onViewportUpdate);
    }
    function onKey(e) { if (e.key === "Escape") close(); }
    function onViewportUpdate(e) {
      // While lightbox is open and user scrolls in parent, follow them
      if (!e.data || e.data.type !== "fg-ratings-viewport") return;
      if (typeof e.data.top !== "number") return;
      lb.style.top = e.data.top + "px";
      lb.style.height = e.data.height + "px";
    }
    lb.addEventListener("click", close);
    lb.querySelector(".fg-lightbox__img").addEventListener("click", e => e.stopPropagation());
    lb.querySelector(".fg-lightbox__close").addEventListener("click", e => {
      e.stopPropagation();
      close();
    });
    document.addEventListener("keydown", onKey);
    if (isEmbedded) {
      window.addEventListener("message", onViewportUpdate);
    }
  }

  function entryHtml(w, isSingleRating) {
    const tags = [];
    if (w.color) tags.push(`<span class="fg-entry__tag">${escapeHtml(w.color)}</span>`);
    if (w.sugar) tags.push(`<span class="fg-entry__tag">${escapeHtml(w.sugar)}</span>`);
    if (w.type) tags.push(`<span class="fg-entry__tag">${escapeHtml(w.type)}</span>`);
    if (w.vintage) tags.push(`<span class="fg-entry__tag">${escapeHtml(w.vintage)}</span>`);

    const grapesHtml = (w.grapes || []).map(g =>
      `<span class="fg-entry__grape-link" data-grape="${escapeHtml(g)}">${escapeHtml(g)}</span>`
    ).join(", ");

    const shopLinks = (w.shop_links || [])
      .map(s => ({ name: s && s.name, url: safeHttpUrl(s && s.url) }))
      .filter(s => s.name && s.url);
    const shopsHtml = shopLinks.length
      ? `<span class="fg-entry__shops-label">Где купить</span>
         ${shopLinks.map(s =>
           `<a class="fg-shop" href="${escapeHtml(s.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(s.name)}</a>`
         ).join("")}`
      : `<p class="fg-entry__no-shops">Сейчас нет в открытой продаже</p>`;

    const rankContext = isSingleRating ? "" :
      `<span class="fg-entry__rank-context">${escapeHtml(w.rating)}</span>`;

    const photoUrl = safeHttpUrl(w.photo || "");
    const photoHtml = photoUrl
      ? `<img src="${escapeHtml(photoUrl)}" alt="${escapeHtml(w.title)}" loading="lazy">`
      : "";
    const rankHtml = escapeHtml(fmtRank(w.rank));

    return `
      <article class="fg-entry">
        <header class="fg-entry__header">
          <div class="fg-entry__rank">${rankHtml}${rankContext}</div>
          <h3 class="fg-entry__title">${escapeHtml(w.title)}</h3>
        </header>
        <div class="fg-entry__photo">${photoHtml}</div>
        <div class="fg-entry__body">
          <div class="fg-entry__tags">${tags.join("")}</div>
          <div class="fg-entry__meta">
            ${grapesHtml ? `<div class="fg-entry__meta-row">
              <span class="fg-entry__meta-key">Виноград</span>
              <span class="fg-entry__meta-val">${grapesHtml}</span>
            </div>` : ""}
            ${w.region ? `<div class="fg-entry__meta-row">
              <span class="fg-entry__meta-key">Регион</span>
              <span class="fg-entry__meta-val">${escapeHtml(w.region)}</span>
            </div>` : ""}
          </div>
        </div>
        <aside class="fg-entry__aside">
          ${w.price ? `<div class="fg-entry__price">${escapeHtml(fmtPrice(w.price))}</div>
            <div class="fg-entry__price-note">примерная розничная цена на дату дегустации</div>` : ""}
          <div class="fg-entry__shops">${shopsHtml}</div>
        </aside>
      </article>
    `;
  }

  // ---------- Pagination ----------
  const PAGE_SIZE = 25;
  let displayCount = PAGE_SIZE;
  let lastFilterKey = null;

  function updateLoadMoreButton(filteredTotal) {
    const btn = $("#fg-load-more");
    const remaining = filteredTotal - displayCount;
    if (remaining > 0) {
      const nextBatch = Math.min(remaining, PAGE_SIZE);
      btn.innerHTML = `Показать ещё <span class="fg-load-more__count">${nextBatch}</span> ${pluralize(nextBatch, "вино", "вина", "вин")}`;
      btn.hidden = false;
    } else {
      btn.hidden = true;
    }
  }

  function updateSortUI() {
    const sortEl = $("#fg-sort");
    sortEl.hidden = false;
    const opt = SORT_OPTIONS.find(o => o.id === state.sort) || SORT_OPTIONS[0];
    $("#fg-sort-value").textContent = opt.label;
  }

  function render() {
    if (!ALL_WINES) return;
    const filtered = ALL_WINES.filter(w => matchesFilters(w, state));
    // Apply sort (works in any view)
    const sorted = sortWines(filtered, state.sort);
    // Reset pagination when filter state changes
    const filterKey = JSON.stringify(state);
    if (filterKey !== lastFilterKey) {
      displayCount = PAGE_SIZE;
      lastFilterKey = filterKey;
    }
    updateFilterButtons();
    renderChips();
    renderMeta(filtered.length);
    renderEntries(sorted.slice(0, displayCount));
    updateLoadMoreButton(filtered.length);
    updateFilterToggleCount();
    updateSortUI();
    updateHash();
  }

  $("#fg-load-more").addEventListener("click", () => {
    displayCount += PAGE_SIZE;
    render();
  });

  window.addEventListener('hashchange', () => {
    if (!RATINGS) return;
    applyHashState();
    render();
  });

  $("#fg-reset").addEventListener("click", () => {
    state.rating = DEFAULT_RATING;
    state.grape = null;
    state.brand = null;
    state.vintage = null;
    state.price = null;
    state.color = null;
    state.sugar = null;
    state.type = null;
    state.region = null;
    state.sort = "default";
    render();
  });

  // ---------- Sort dropdown ----------
  const sortBtn = root.querySelector(".fg-sort__btn");
  const sortDropdown = root.querySelector(".fg-sort__dropdown");

  function renderSortDropdown() {
    sortDropdown.innerHTML = SORT_OPTIONS.map(opt =>
      `<button type="button" class="fg-sort__opt" role="option"
        aria-selected="${state.sort === opt.id}" data-sort="${opt.id}">${opt.label}</button>`
    ).join("");
    sortDropdown.querySelectorAll(".fg-sort__opt").forEach(btn => {
      btn.addEventListener("click", () => {
        state.sort = btn.dataset.sort;
        sortDropdown.hidden = true;
        sortBtn.setAttribute("aria-expanded", "false");
        render();
      });
    });
  }

  sortBtn.addEventListener("click", e => {
    e.stopPropagation();
    const willOpen = sortDropdown.hidden;
    if (willOpen) renderSortDropdown();
    sortDropdown.hidden = !willOpen;
    sortBtn.setAttribute("aria-expanded", willOpen ? "true" : "false");
  });

  document.addEventListener("click", e => {
    if (!sortDropdown.hidden && !sortDropdown.contains(e.target) && e.target !== sortBtn) {
      sortDropdown.hidden = true;
      sortBtn.setAttribute("aria-expanded", "false");
    }
  });

  // ---------- Mobile filter-bar toggle ----------
  const filterSection = root.querySelector(".fg-filters-section");
  const filterToggle = root.querySelector(".fg-filters-toggle");
  const filterToggleText = root.querySelector(".fg-filters-toggle__text");
  const filterToggleCount = root.querySelector("#fg-filters-toggle-count");

  filterToggle.addEventListener("click", () => {
    const expanded = filterSection.dataset.expanded === "true";
    filterSection.dataset.expanded = expanded ? "false" : "true";
    filterToggle.setAttribute("aria-expanded", expanded ? "false" : "true");
    filterToggleText.textContent = expanded ? "Показать фильтры" : "Скрыть фильтры";
  });

  function updateFilterToggleCount() {
    const active = ["color", "sugar", "type", "grape", "region", "vintage", "brand", "price"]
      .filter(k => state[k]).length;
    if (active > 0) {
      filterToggleCount.hidden = false;
      filterToggleCount.textContent = `· ${active} ${pluralize(active, "активный", "активных", "активных")}`;
    } else {
      filterToggleCount.hidden = true;
      filterToggleCount.textContent = "";
    }
  }

})();
</script>

<script>
/* iframe auto-resize: when this page is embedded in an iframe (e.g. in Tilda),
   notify the parent window of content-height changes so the iframe can be
   resized to fit content with no scrollbar/padding.

   Measures `.fg-ratings` rather than document.body — that excludes
   absolutely-positioned children (filter dropdowns, lightbox), so the iframe
   doesn't grow when a dropdown opens. */
(function() {
  if (window.parent === window) return; // not embedded — nothing to do

  // Reset body margin so measurement is exact (default UA margin is 8px)
  document.documentElement.style.margin = "0";
  document.body.style.margin = "0";

  const target = document.querySelector(".fg-ratings");
  if (!target) return;

  let lastHeight = 0;
  let scheduled = false;

  function send() {
    scheduled = false;
    const h = Math.ceil(target.offsetTop + target.offsetHeight);
    if (h > 0 && h !== lastHeight) {
      lastHeight = h;
      window.parent.postMessage(
        { type: "fg-ratings-height", height: h },
        "*"
      );
    }
  }

  function schedule() {
    if (scheduled) return;
    scheduled = true;
    requestAnimationFrame(send);
  }

  // Watch the namespaced container only — absolute-positioned descendants
  // (dropdowns, lightbox) won't affect its offsetHeight
  if (typeof ResizeObserver !== "undefined") {
    new ResizeObserver(schedule).observe(target);
  } else {
    setInterval(send, 500);
  }

  // Initial post once layout settles
  if (document.readyState === "complete") {
    schedule();
  } else {
    window.addEventListener("load", schedule);
  }

  // Belt-and-suspenders: re-check after any click — covers transitions,
  // image loads, and any layout shifts not caught by ResizeObserver
  document.addEventListener("click", () => setTimeout(schedule, 200));

  // Receive viewport info from parent (used to position lightbox over the
  // currently visible portion of the iframe, not the start of it)
  window.addEventListener("message", function(e) {
    if (!e.data) return;
    if (e.data.type === "fg-ratings-viewport") {
      if (typeof e.data.top !== "number" || typeof e.data.height !== "number") return;
      window.__fgViewport = { top: e.data.top, height: e.data.height };
    } else if (e.data.type === "fg-ratings-init-hash") {
      // Parent sends its current hash so we can sync to it on first load
      // (allows shared/bookmarked URLs like /w_ratings#chardonnay-03-2026)
      if (typeof e.data.hash === "string" && e.data.hash) {
        try {
          if (location.hash !== "#" + e.data.hash) {
            location.hash = e.data.hash;
          }
        } catch (err) { /* ignore */ }
      }
    }
  });
})();
</script>
